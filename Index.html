<title>Fretboard 3.32</title>
<style>

  --yellow:#ffd400;--green:#00cc00;
}
*{box-sizing:border-box}
body{width:100%;margin:0;font-family:Arial,Helvetica,sans-serif;font-size:14px;background:#fff;display:flex;justify-content:flex-start;align-items:flex-start;padding:12px;overflow:auto;min-width:max-content}

.app{display:inline-block;flex-shrink:0;border:2px solid #333;border-radius:28px;padding:20px;background:linear-gradient(180deg,#f7f7f7,#ececec);box-shadow:0 18px 40px rgba(0,0,0,.12)}
.layout{display:flex;gap:18px;align-items:flex-start;justify-content:center;flex-wrap:nowrap}

.maincol{display:flex;flex-direction:column;align-items:center;gap:10px}
.panel,.wrap,.chordbar,.posbtn{background:#fff;border-radius:18px;box-shadow:0 6px 18px rgba(0,0,0,.08)}
.panel{width:92px;height:92px;padding:8px;display:grid;grid-template-columns:1fr;gap:7px;align-content:center;overflow:hidden}
.btn,.sel{border:1px solid #cfcfcf;background:#fff;border-radius:12px;height:30px;font-size:14px;cursor:pointer;width:100%}
.sel{text-align:center;text-align-last:center;padding:0 6px}

.posbtn{width:92px;height:92px;border:0;display:flex;align-items:center;justify-content:center;cursor:pointer}
.seg{display:flex;width:100%;border:1px solid #bbb;border-radius:10px;overflow:hidden}
.seg button{flex:1;border:0;background:#fff;height:28px;cursor:pointer}.seg button.on{background:#111;color:#fff}
.row{display:grid;grid-template-columns:18px 1fr;align-items:center;justify-items:center;gap:3px;min-height:22px}
.sw{position:relative;width:34px;height:18px}.sw input{opacity:0;width:0;height:0;position:absolute}.sl{position:absolute;inset:0;background:#ccc;border-radius:999px}.sl:before{content:'';position:absolute;width:14px;height:14px;left:2px;top:2px;background:#fff;border-radius:50%;box-shadow:0 1px 3px #0003;transition:.2s}.sw input:checked+.sl{background:var(--blue)}.sw input:checked+.sl:before{transform:translateX(16px)}
.bpmctl{background:#fff;border:1px solid #888;border-radius:10px;padding:4px;display:flex;align-items:center;gap:3px;justify-content:center}.bpmbtn{width:18px;height:22px;border:1px solid #aaa;border-radius:6px;background:#fff;cursor:pointer}.bpmmid{display:flex;flex-direction:column;align-items:center;line-height:1}.bpmlab{font-size:10px;color:#444}
.chordbar{width:92px;height:92px;padding:8px;display:flex;align-items:center;justify-content:center;text-align:center;border:0;cursor:pointer;font-size:15px;line-height:1.1;color:#111}
.chordbar.on{box-shadow:inset 0 0 0 2px var(--yellow),0 8px 24px #0001}
.cline{display:flex;align-items:center;gap:8px;line-height:1.1;border:1px solid #ddd;background:#fff;border-radius:12px;font-size:22px;cursor:pointer;padding:9px 12px;text-align:left;min-height:42px;color:#111;width:100%;white-space:nowrap}.cline:hover{text-decoration:underline}.cline.playing,.cline.playing .rn,.cline.modalroot,.cline.modalroot .rn{color:var(--blue)}.cline.chordsel,.cline.chordsel .rn{background:#fff7b8;text-decoration:underline;text-decoration-thickness:2px}.rn{color:#999;display:inline-block;min-width:42px}
.chordmodal{position:fixed;inset:0;display:none;z-index:998;pointer-events:none;background:transparent}
.chordmodal.on{display:block}
.chordbox{position:fixed;left:12px;top:12px;background:#fff;border-radius:18px;padding:12px;box-shadow:0 10px 30px #0005;width:152px;max-height:calc(100vh - 24px);overflow:auto;pointer-events:auto}
.chordbox h3{margin:0 0 8px;font-size:16px}
.chordlist{display:grid;grid-template-columns:1fr;gap:7px;margin-bottom:10px}
.chordclose{border:1px solid #aaa;background:#fff;border-radius:9px;padding:7px 10px;cursor:pointer;width:100%;font-size:15px}
.wrap{padding:20px}.shell{position:relative;width:var(--board-w);padding-top:var(--head-h);background:linear-gradient(180deg,#bf8b4d 0%,#d8a76b 12%,#e1b67d 50%,#d8a76b 88%,#bf8b4d 100%)}.openrow{position:absolute;top:0;left:0;width:100%;height:var(--head-h);pointer-events:none}.open{position:absolute;top:32px;transform:translateX(-50%);width:23px;height:23px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#111;background:transparent;border:0;pointer-events:auto}.open.black,.mark.black{background:var(--black);color:#fff}.open.blue,.mark.blue{background:var(--blue);color:#fff}.open.gray,.mark.gray{background:var(--gray);color:#111;z-index:15}.tune{position:absolute;top:2px;transform:translateX(-50%);width:16px;height:34px;border:1px solid #8f7a55;border-radius:8px;background:#ffffff47;pointer-events:auto}.tune:before{content:'';position:absolute;left:2px;right:2px;top:50%;height:1px;background:#503c1e73}.nut{position:absolute;top:calc(var(--head-h) - 4px);left:0;width:100%;height:var(--nut-h);background:#141414;z-index:5}.board{position:relative;width:100%;height:var(--board-h);overflow:visible}.fret{position:absolute;left:0;width:100%;height:3px;background:linear-gradient(#eee,#888,#eee);box-shadow:0 1px 2px #0006;z-index:2}.string{position:absolute;top:0;height:100%;transform:translateX(-50%);background:linear-gradient(to right,#666,#ddd,#666);border-radius:999px;z-index:3;cursor:pointer}.inlay{position:absolute;width:14px;height:14px;border-radius:50%;background:rgba(245,245,245,.92);left:50%;transform:translate(-50%,-50%);z-index:1}.hit{position:absolute;width:24px;transform:translate(-50%,-50%);border-radius:14px;cursor:pointer;z-index:8}.mark{position:absolute;width:23px;height:23px;border-radius:50%;display:flex;align-items:center;justify-content:center;transform:translate(-50%,-50%);font-size:14px;z-index:10;box-shadow:0 2px 6px #0004;cursor:pointer}.root{outline:none!important}.money{border:3px solid var(--blue)}.triad{background:var(--pink)!important;color:#fff!important;border:2px solid #b00063}.chordring,.triadrootring,.keyrootring{position:absolute;border-radius:50%;transform:translate(-50%,-50%);pointer-events:none}.chordring{width:29px;height:29px;border:3px solid var(--green);background:transparent!important;z-index:18;box-shadow:0 0 0 1px #0005}.triadrootring{width:39px;height:39px;border:3px solid var(--green);background:transparent!important;z-index:19;box-shadow:0 0 0 1px #0005}.keyrootring{width:35px;height:35px;border:1.5px solid #000;background:transparent!important;z-index:16;box-shadow:0 0 0 1px #0005}.triadghost{background:transparent!important;color:var(--green)!important;text-shadow:0 1px 2px #000,0 0 2px #000;box-shadow:none!important;z-index:20;pointer-events:none;font-weight:700}.triadpentdot{position:absolute;width:18px;height:18px;border-radius:50%;background:var(--blue);transform:translate(-50%,-50%);z-index:9;pointer-events:none;box-shadow:0 1px 4px #0005;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;text-shadow:0 1px 2px #000}.keyposdot{position:absolute;width:7px;height:7px;border-radius:50%;background:#000;border:1px solid #fff;transform:translate(-50%,-50%);z-index:16;pointer-events:none;box-shadow:0 1px 2px #0006}.fretlab{position:absolute;right:-18px;transform:translateY(-50%);width:18px;text-align:center;color:#666;z-index:16;border:0;background:transparent;font-size:14px;cursor:pointer;padding:0}.stringlab{position:absolute;border:0;background:transparent;color:#666;font-size:13px;width:18px;height:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:18;padding:0}.stringlab.on,.fretlab.on{color:#111;font-weight:700;text-decoration:underline}.frethi,.stringhi,.cellhi{position:absolute;background:rgba(255,255,255,.45);z-index:1;pointer-events:none}.frethi{left:0;width:100%}.stringhi{top:0;height:100%}.plinksvg,.segfill{position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none;overflow:visible}.plinksvg{z-index:9}.segfill{z-index:12}.segmark{position:absolute;border-radius:999px;z-index:13;pointer-events:auto;box-shadow:0 1px 5px #0005;cursor:pointer}.segmark.blue{background:var(--blue)}.segmark.red{background:#d21818}.playlabel{position:absolute;display:flex;gap:8px;align-items:center;z-index:30;pointer-events:none;transform:translateY(-50%)}.playlabel .now,.playlabel .next{background:rgba(255,255,255,.88);border-radius:10px;padding:6px 9px;box-shadow:0 2px 8px #0003;line-height:1}.playlabel .now{font-size:26px;color:#111}.playlabel .next{font-size:14px;color:#888}
.triadmodal{position:fixed;inset:0;background:#0005;display:none;align-items:center;justify-content:center;z-index:999}.triadmodal.on{display:flex}.triadbox{background:#fff;border-radius:18px;padding:16px;box-shadow:0 10px 30px #0005;min-width:210px}.triadbox h3{margin:0 0 10px;font-size:16px}.triadgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}.triadgrid label{display:flex;gap:5px;align-items:center;justify-content:center;border:1px solid #bbb;border-radius:10px;padding:6px;background:#fafafa}.triadactions{display:flex;gap:8px;justify-content:flex-end}.triadactions button{border:1px solid #aaa;background:#fff;border-radius:9px;padding:6px 10px;cursor:pointer}
.mark.triad{}
.triadlabel{display:flex;align-items:center;justify-content:center;width:23px;height:23px;}

/* Final triad/root overlay corrections */
.chordring{border-color:#00cc00!important;background:transparent!important;}
.triadrootring{border-color:#00cc00!important;background:transparent!important;}
.keyrootring{border-color:#000!important;background:transparent!important;}
.triadghost{color:#00cc00!important;background:transparent!important;text-shadow:0 1px 2px #000,0 0 2px #000!important;}


#posBtnMain{
  display:flex!important;
  flex-direction:column!important;
  align-items:center!important;
  justify-content:center!important;
  text-align:center!important;
  line-height:1.1!important;
  gap:2px;
}
#posBtnMain div{display:block!important;width:100%;}


.playmenubtn{font-size:15px;line-height:1.1}
.playmenubtn.on{box-shadow:inset 0 0 0 2px var(--yellow),0 8px 24px #0001}
.playbox{position:fixed;left:12px;top:12px;background:#fff;border-radius:18px;padding:12px;box-shadow:0 10px 30px #0005;width:152px;max-height:calc(100vh - 24px);overflow:auto;pointer-events:auto}
.playbox h3{margin:0 0 8px;font-size:16px}
.playaction{height:36px;margin-bottom:10px;font-size:15px}
.playrow{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px;font-size:14px}
.playbpm{width:100%;margin-bottom:10px}


.displaytoolsbtn{font-size:15px}
.displaytoolsbtn.on{box-shadow:inset 0 0 0 2px var(--yellow),0 8px 24px #0001}
.displaybox{position:fixed;left:12px;top:12px;background:#fff;border-radius:18px;padding:12px;box-shadow:0 10px 30px #0005;width:152px;max-height:calc(100vh - 24px);overflow:auto;pointer-events:auto;display:grid;gap:8px}
.displaybox h3{margin:0 0 2px;font-size:16px}
.displayrow{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:14px}

.playselect{margin-bottom:10px}

.triadsettingsbtn{font-size:15px;line-height:1.1}
.triadsettingsbtn.on{box-shadow:inset 0 0 0 2px var(--yellow),0 8px 24px #0001}


.chordbar{font-size:19px!important;line-height:1.25!important;gap:10px!important}
.chordbtnrn,.chordbtnnote{display:inline-block}
.chordbtnrn{margin-right:14px}


.chordbar{flex-direction:column!important;gap:4px!important;font-size:20px!important;line-height:1.1!important}
.chordbtnline{display:flex;justify-content:center;align-items:center;width:100%}
.chordbtnline.next{font-size:13px;color:#777}
.chordbtnrn{margin-right:14px}


.triadmodal{background:transparent!important;align-items:flex-start!important;justify-content:flex-start!important;pointer-events:none!important}
.triadmodal.on{display:block!important}
.triadbox{position:fixed;left:12px;top:12px;width:152px!important;min-width:0!important;max-height:calc(100vh - 24px);overflow:auto;pointer-events:auto;display:grid;gap:8px;padding:12px!important}
.triadbox h3{margin:0 0 2px!important;font-size:16px!important}
.triadrows{display:grid;gap:8px}
.triadbox .triadactions{display:grid!important;grid-template-columns:1fr 1fr;gap:8px}
.triadbox .triadactions button{width:100%}


/* UI text color normalization */
.leftcol button,

.playbox h3,

.chordbar span,

}


.resetbtn{
  width:92px;
  height:38px;
  border:1px solid #aaa;
  border-radius:8px;
  background:#fff;
  box-shadow:0 8px 24px #0001;
  cursor:pointer;
  font-size:14px;
  color:#000;
}


.leadingtriaddot{
  position:absolute;
  width:15px;
  height:15px;
  border-radius:50%;
  background:#ff0000;
  transform:translate(-50%,-50%);
  z-index:21;

  box-shadow:0 1px 4px #0006;
}

  position:fixed;
  background:#fff;
  border-radius:18px;
  padding:12px;
  box-shadow:0 10px 30px #0005;
  width:152px;
  max-height:calc(100vh - 24px);
  overflow:auto;
  pointer-events:auto;

  gap:8px;
}

.panel,.chordbar,.posbtn{

}

}

/* === Fretboard 2.90: second-pass visual polish === */
:root{
  --app-bg-1:#fbfbfc;
  --app-bg-2:#eceff2;
  --card-bg:rgba(255,255,255,.86);
  --card-border:rgba(255,255,255,.9);
  --card-shadow:0 14px 32px rgba(23,28,35,.14);
  --card-shadow-soft:0 8px 20px rgba(23,28,35,.09);
  --control-border:#d9dde2;
  --control-focus:#f3c84b;
  --wood-hi:#efc78e;
  --wood-mid:#d6a064;
  --wood-lo:#a96f36;
  --steel-hi:#ffffff;
  --steel-mid:#babec4;
  --steel-lo:#6f747b;
}
body{
  background:
    radial-gradient(circle at 50% 0%,rgba(255,255,255,.95),rgba(245,246,248,.72) 38%,rgba(229,233,238,.92) 100%);
  -webkit-font-smoothing:antialiased;
  text-rendering:geometricPrecision;
}
.app{
  border:1px solid rgba(40,48,58,.18)!important;
  background:
    linear-gradient(180deg,var(--app-bg-1),var(--app-bg-2))!important;
  box-shadow:
    0 26px 70px rgba(0,0,0,.16),
    inset 0 1px 0 rgba(255,255,255,.9)!important;
  border-radius:32px!important;
}
.panel,.chordbar,.posbtn,.resetbtn{
  background:var(--card-bg)!important;
  border:1px solid var(--card-border)!important;
  box-shadow:var(--card-shadow-soft)!important;
  backdrop-filter:blur(14px) saturate(1.15);
  -webkit-backdrop-filter:blur(14px) saturate(1.15);
  transition:transform .14s ease, box-shadow .14s ease, background .14s ease;
}
.posbtn:hover,.resetbtn:hover,.chordbar:hover{
  transform:translateY(-1px);
  box-shadow:var(--card-shadow)!important;
}
.posbtn:active,.resetbtn:active,.chordbar:active{
  transform:translateY(1px) scale(.995);
}
.iconbtn.on,.posbtn.on,.chordbar.on,.playmenubtn.on,.displaytoolsbtn.on,.triadsettingsbtn.on{
  box-shadow:
    inset 0 0 0 2px var(--control-focus),
    var(--card-shadow-soft)!important;
  background:linear-gradient(180deg,#fffef7,#ffffff)!important;
}
.btn,.sel,.bpmbtn,.chordclose,.triadactions button{
  border:1px solid var(--control-border)!important;
  background:linear-gradient(180deg,#ffffff,#f7f8fa)!important;
  color:#111!important;
  box-shadow:0 1px 0 rgba(255,255,255,.9),0 2px 5px rgba(0,0,0,.04);
}
.btn:active,.bpmbtn:active,.chordclose:active,.triadactions button:active{
  transform:translateY(1px);
}
.seg{
  border:1px solid var(--control-border)!important;
  background:#f4f6f8!important;
  box-shadow:inset 0 1px 3px rgba(0,0,0,.06);
}
.seg button{
  background:transparent!important;
  font-weight:600;
}
.seg button.on{
  background:#171a1f!important;
  color:#fff!important;
  box-shadow:0 1px 4px rgba(0,0,0,.18);
}
.sw{
  filter:drop-shadow(0 1px 1px rgba(0,0,0,.08));
}
.sl{
  background:#d5d9df!important;
  box-shadow:inset 0 1px 2px rgba(0,0,0,.16);
}
.sl:before{
  background:linear-gradient(180deg,#fff,#f0f2f5)!important;
}
.sw input:checked+.sl{
  background:linear-gradient(180deg,#2b6fe3,#1f63d8)!important;
}
.wrap{
  background:
    linear-gradient(180deg,rgba(255,255,255,.82),rgba(255,255,255,.58))!important;
  border:1px solid rgba(255,255,255,.82);
  box-shadow:
    0 18px 44px rgba(0,0,0,.13),
    inset 0 1px 0 rgba(255,255,255,.85)!important;
}
.shell{
  border-radius:0 0 8px 8px;
  background:
    linear-gradient(90deg,rgba(85,45,16,.14),rgba(255,255,255,.06) 18%,rgba(80,44,16,.08) 50%,rgba(255,255,255,.07) 82%,rgba(72,39,14,.16)),
    linear-gradient(180deg,var(--wood-lo) 0%,var(--wood-mid) 8%,var(--wood-hi) 35%,var(--wood-mid) 70%,var(--wood-lo) 100%)!important;
  box-shadow:
    inset 8px 0 18px rgba(79,42,10,.18),
    inset -8px 0 18px rgba(79,42,10,.18);
}
.board{
  background:
    repeating-linear-gradient(90deg,rgba(92,45,12,.055) 0 2px,transparent 2px 9px),
    linear-gradient(180deg,rgba(255,255,255,.1),rgba(0,0,0,.05));
}
.nut{
  background:linear-gradient(90deg,#080808,#2a2a2a 45%,#070707)!important;
  box-shadow:0 2px 6px rgba(0,0,0,.45);
}
.fret{
  height:4px!important;
  background:
    linear-gradient(180deg,var(--steel-hi),var(--steel-mid) 48%,var(--steel-lo) 52%,var(--steel-hi))!important;
  box-shadow:
    0 1px 2px rgba(0,0,0,.42),
    inset 0 1px 0 rgba(255,255,255,.75)!important;
}
.string{
  background:
    linear-gradient(90deg,#4e535a 0%,#ffffff 42%,#9da3aa 52%,#f6f7f8 72%,#4b5058 100%)!important;
  box-shadow:
    0 1px 3px rgba(0,0,0,.42),
    inset 0 0 1px rgba(255,255,255,.85)!important;
}
.inlay{
  background:
    radial-gradient(circle at 32% 30%,#ffffff 0%,#f7f7f7 28%,#d9d9d9 68%,#9ea3aa 100%)!important;
  box-shadow:
    inset 0 1px 1px rgba(255,255,255,.8),
    0 1px 4px rgba(0,0,0,.28)!important;
  opacity:.96;
}
.tune{
  border-color:rgba(82,54,26,.45)!important;
  background:linear-gradient(180deg,rgba(255,255,255,.58),rgba(255,255,255,.24))!important;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.6),0 1px 3px rgba(0,0,0,.16);
}
.open,.mark{
  box-shadow:
    0 3px 7px rgba(0,0,0,.28),
    inset 0 1px 0 rgba(255,255,255,.2)!important;
  font-weight:700;
}
.mark.black,.open.black{
  background:linear-gradient(180deg,#222,#050505)!important;
}
.mark.gray,.open.gray{
  background:linear-gradient(180deg,#c8c8c8,#8e8e8e)!important;
}
.mark.blue,.open.blue{
  background:linear-gradient(180deg,#357af0,#1452bd)!important;
}
.chordring{
  border-width:2.5px!important;
  border-color:#00c853!important;
  filter:drop-shadow(0 1px 2px rgba(0,0,0,.35));
}
.triadrootring{
  border-width:2px!important;
  border-color:#00e05a!important;
  box-shadow:0 0 0 1px rgba(0,0,0,.35),0 0 8px rgba(0,224,90,.25)!important;
}
.keyrootring{
  border-width:2px!important;
  box-shadow:0 0 0 1px rgba(255,255,255,.8),0 1px 4px rgba(0,0,0,.35)!important;
}
.triadghost{

<div id="playDialog" class="chordmodal"><div class="playbox"><h3>Sound</h3>
  <button id="droneBtn" class="btn playaction" type="button"><span class="playGlyph" aria-hidden="true"></span></button>
  <select id="progSel" class="sel playselect"><option value="">Chord</option></select>
  <select id="rhythmSel" class="sel playselect"><option value="">Beats</option></select>

  <div class="displaysectionlabel">General:</div>

  <button id="flatBtn" class="segHidden" type="button" hidden style="display:none">♭</button><button id="sharpBtn" class="segHidden" type="button" hidden style="display:none">#</button>
  <button id="noteBtn" class="segHidden" type="button" hidden style="display:none">♩</button><button id="intBtn" class="segHidden" type="button" hidden style="display:none">INT</button>
  <div class="displayrow"><span>All Bars</span><label class="sw"><input id="playTog" type="checkbox"><span class="sl"></span></label></div>
  <div class="displayrow"><span>All Lines</span><label class="sw"><input id="plineTog" type="checkbox"><span class="sl"></span></label></div>

  <div class="displaysectionlabel">Triads:</div>
  <input type="checkbox" id="triadEnableCheck" hidden style="display:none">
  <input id="triadTog" type="checkbox" hidden style="display:none">
  <input type="checkbox" id="keyPosCheck" hidden style="display:none">
  <input type="checkbox" id="voiceLeadCheck" checked hidden style="display:none">

  <div class="displayrow"><span>String 1</span><label class="sw"><input type="checkbox" id="triStr1"><span class="sl"></span></label></div>
  <div class="displayrow"><span>String 2</span><label class="sw"><input type="checkbox" id="triStr2" checked><span class="sl"></span></label></div>
  <div class="displayrow"><span>String 3</span><label class="sw"><input type="checkbox" id="triStr3" checked><span class="sl"></span></label></div>
  <div class="displayrow"><span>String 4</span><label class="sw"><input type="checkbox" id="triStr4" checked><span class="sl"></span></label></div>
  <div class="displayrow"><span>String 5</span><label class="sw"><input type="checkbox" id="triStr5"><span class="sl"></span></label></div>
  <div class="displayrow"><span>String 6</span><label class="sw"><input type="checkbox" id="triStr6"><span class="sl"></span></label></div>
  <div class="displayrow"><span>Leading Triad</span><label class="sw"><input type="checkbox" id="leadingTriadCheck"><span class="sl"></span></label></div>
  <div class="displayrow"><span>Triad Pentatonic</span><label class="sw"><input type="checkbox" id="triadPentCheck"><span class="sl"></span></label></div>

  <button id="displayClose" tabindex="-1" aria-hidden="true" class="chordclose" type="button">Close</button>
</div></div>
<div id="barsDialog" class="chordmodal" hidden style="display:none"><input id="barsModeCheck" type="checkbox"><button id="barsClose" type="button"></button></div>
<div id="notesDialog" class="chordmodal" hidden style="display:none"><input id="notesModeCheck" type="checkbox"><button id="notesClose" type="button"></button></div>
<div id="linesDialog" class="chordmodal" hidden style="display:none"><input id="linesModeCheck" type="checkbox"><button id="linesClose" type="button"></button></div>
<script>
const SH=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const FL=['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
const TUN=['E','A','D','G','B','E'];
const STRING_WIDTH=[6,5,4,3,2.5,2];
const MAJ=[0,2,4,5,7,9,11];
const MODES=['Ionian','Dorian','Phrygian','Lydian','Mixolydian','Aeolian','Locrian'];
const RHYTHMS=[
  {id:'steady',name:'Steady 1 & 3'},
  {id:'four',name:'Four pulse'},
  {id:'backbeat',name:'Backbeat lift'},
  {id:'offbeat',name:'Offbeat push'},
  {id:'bossa',name:'Bossa-ish'},
  {id:'waltz',name:'Waltz feel'},
  {id:'tango',name:'Tango long-short'},
  {id:'anticipate',name:'Anticipated 4'},
  {id:'swing',name:'Swing pairs'},
  {id:'sparse',name:'Sparse sustain'}
];
const TOTAL_FRETS=15, LABEL_FRETS=[3,5,7,9,12,15], INLAY_FRETS=[3,5,7,9,12,15];
const KEY_FLAT=[['C','Am'],['Db','Bbm'],['D','Bm'],['Eb','Cm'],['E','C#m'],['F','Dm'],['Gb','Ebm'],['G','Em'],['Ab','Fm'],['A','F#m'],['Bb','Gm'],['B','G#m']];
const KEY_SHARP=[['C','Am'],['C#','A#m'],['D','Bm'],['D#','Cm'],['E','C#m'],['F','Dm'],['F#','D#m'],['G','Em'],['G#','Fm'],['A','F#m'],['A#','Gm'],['B','G#m']];
const BASE_MIDI=[40,45,50,55,59,64];

const S={
  key:'C/Am',mode:null,modeType:'none',acc:'sharp',label:'interval',tuning:[...TUN],
  marks:new Map(),color:'blue',stage:0,insertMode:'notes',pendingSwitch:null,showAllBars:false,root:0,triadOn:false,triad:null,
  triadStrings:new Set([2,3,4]),leadingTriad:false,leadingTriadChord:null,triadPent:false,showKeyPositions:false,bpm:80,rhythm:'steady',
  active:null,chordSelect:null,hiFrets:new Set(),hiStrings:new Set(),lastHi:null,
  prevKeyRoot:0,segments:new Set(),manualLines:new Set(),autoSegMarks:new Set(),pLines:false,chordDialogOpen:false,playDialogOpen:false,displayDialogOpen:false
};
let AC=null,drone=null;
const $=id=>document.getElementById(id);
const bd=$('board'), orow=$('openrow'), chordBox=$('chords'), chordDialog=$('chordDialog'), chordDialogList=$('chordDialogList'), playDialog=$('playDialog'), playMenuBtn=$('playMenuBtn'), displayDialog=$('displayDialog'), displayToolsBtn=$('displayToolsBtn'), triadSettingsBtn=$('triadSettingsBtn'), resetBtn=$('resetBtn'), rhythmSel=$('rhythmSel'), flatSharpToggle=$('flatSharpToggle'), letterNotesToggle=$('letterNotesToggle'), barsDialog=$('barsDialog'), linesDialog=$('linesDialog'), notesDialog=$('notesDialog'), barsModeCheck=$('barsModeCheck'), linesModeCheck=$('linesModeCheck'), notesModeCheck=$('notesModeCheck'), triadEnableCheck=$('triadEnableCheck'), triadTog=$('triadTog'), leadingTriadCheck=$('leadingTriadCheck'), triadPentCheck=$('triadPentCheck'), keyPosCheck=$('keyPosCheck'), triStr1=$('triStr1'), triStr2=$('triStr2'), triStr3=$('triStr3'), triStr4=$('triStr4'), triStr5=$('triStr5'), triStr6=$('triStr6'), progSel=$('progSel'), metroTog=$('metroTog'), bpmNum=$('bpmNum'), bpmMinus=$('bpmMinus'), bpmPlus=$('bpmPlus'), droneBtn=$('droneBtn'), playClose=$('playClose'), chordClose=$('chordClose'), displayClose=$('displayClose'), triCancel=$('triCancel'), triSave=$('triSave'), barsClose=$('barsClose'), linesClose=$('linesClose'), notesClose=$('notesClose'), flatBtn=$('flatBtn'), sharpBtn=$('sharpBtn'), noteBtn=$('noteBtn'), intBtn=$('intBtn'), playTog=$('playTog'), plineTog=$('plineTog'), keySel=$('keySel'), modeSel=$('modeSel');

const norm=n=>({C:'C','B#':'C','C#':'C#',Db:'C#',D:'D','D#':'D#',Eb:'D#',E:'E',Fb:'E',F:'F','E#':'F','F#':'F#',Gb:'F#',G:'G','G#':'G#',Ab:'G#',A:'A','A#':'A#',Bb:'A#',B:'B',Cb:'B'}[n]||n);
const ni=n=>SH.indexOf(norm(n));
const notes=()=>S.acc==='sharp'?SH:FL;
const spell=i=>notes()[((i%12)+12)%12];
const keySet=()=>S.acc==='sharp'?KEY_SHARP:KEY_FLAT;
const keyObj=()=>keySet().find(k=>k[0]+'/'+k[1]===S.key)||keySet()[0];
const parent=()=>MAJ.map(x=>(ni(keyObj()[0])+x)%12);
const modeIndex=()=>S.mode===null?0:S.mode;
const rotatedScale=()=>parent().slice(modeIndex()).concat(parent().slice(0,modeIndex()));
const root=()=>parent()[modeIndex()];
const pcAt=(s,f)=>(ni(S.tuning[s])+f)%12;
const noteAt=(s,f)=>spell(pcAt(s,f));
const keyOf=(s,f)=>s+'-'+f;

function intName(pc,rt){
  const sem=((pc-rt)%12+12)%12;
  const names=['1','b2','2','b3','3','4','b5','5','b6','6','b7','7'];
  if(S.modeType==='none'||S.modeType==='degree')return names[sem];
  if((MODES[S.mode]==='Lydian'||MODES[S.mode]==='Dorian')&&sem===6)return '#4';
  return sem===0?'R':names[sem];
}
function dotText(s,f){
  if(S.label!=='interval')return noteAt(s,f);
  const ref=S.modeType==='greek'?S.root:parent()[0];
  return intName(pcAt(s,f),ref);
}
function mark(s,f,c){return{s,f,c,t:dotText(s,f)}}
function manualLineNeedsKey(mk){
  for(const key of S.manualLines||[]){
    const ln=lineFromKey(key);
    if(keyOf(ln.s,ln.f)===mk||keyOf(ln.s2,ln.f2)===mk)return true;
  }
  return false;
}
function safeDeleteLineEndpoint(mk){
  // Do not remove a visible note if a bar still uses it as a structural marker.
  for(const segKey of S.segments||[]){
    const seg=segmentToFrets(segKey);
    if(seg&&(keyOf(seg.s,seg.a)===mk||keyOf(seg.s,seg.b)===mk))return;
  }
  S.marks.delete(mk);
}
function fretY(f){return f/TOTAL_FRETS*bd.clientHeight}
function stringXs(){const w=bd.clientWidth,m=14,u=w-m*2;return Array.from({length:6},(_,i)=>m+u*i/5)}
function yForFret(f){return f===0?0:(fretY(f-1)+fretY(f))/2}
function midiAt(s,f){let m=BASE_MIDI[s],pc=ni(S.tuning[s]);while(m%12!==pc)m++;return m+f}

function populateControls(){
  const oldProg=progSel.value;
  const oldRhythm=S.rhythm;
  const keepKey=S.key || keySel.value || 'C/Am';

  keySel.innerHTML='';
  keySet().forEach(([a,b])=>keySel.add(new Option(a+'/'+b,a+'/'+b)));

  if([...keySel.options].some(o=>o.value===keepKey)){
    S.key=keepKey;
    keySel.value=keepKey;
  }else{
    S.key=keySel.value=keySel.options[0].value;
  }

  modeSel.innerHTML='';
  modeSel.add(new Option('Mode',''));

  MODES.forEach((name,i)=>{
    modeSel.add(new Option((i+1)+'-mode','d'+i));
  });

  const majorPc=ni(keyObj()[0]);
  MODES.forEach((name,i)=>{
    modeSel.add(new Option(spell(majorPc+MAJ[i])+'-'+name,'g'+i));
  });

  modeSel.value=S.mode===null?'':S.modeType[0]+S.mode;

  progSel.innerHTML='<option value="">Chord</option>';
  progressions().forEach((prog,i)=>progSel.add(new Option(prog.map(j=>['I','ii','iii','IV','V','vi','vii°'][j]).join('-'),i)));
  progSel.value=[...progSel.options].some(o=>o.value===oldProg)?oldProg:'';

  rhythmSel.innerHTML='<option value="">Beats</option>';
  RHYTHMS.forEach(r=>rhythmSel.add(new Option(r.name,r.id)));
  rhythmSel.value=(oldRhythm&&oldRhythm!=='steady')?oldRhythm:'';
}

function handleKeyChange(){
  const newKey=keySel.value;
  if(!newKey)return;

  const oldMajor=(S.key||'C/Am').split('/')[0];
  const newMajor=newKey.split('/')[0];
  const oldRoot=ni(oldMajor);
  const newRoot=ni(newMajor);

  S.key=newKey;
  S.prevKeyRoot=newRoot;

  transposeSegments(keyShiftDelta(oldRoot,newRoot));
  rebuildPositions();
  syncSegmentMarks();

  if(drone)stopDrone();
  render();
}

function updateScaleButton(){
  if(S.stage===0)posBtnMain.innerHTML='<div>Finger Positions</div>';
  else if(S.stage===1)posBtnMain.innerHTML='<div>Finger Positions</div><div class="subline">(pentatonic)</div>';
  else posBtnMain.innerHTML='<div>Finger Positions</div><div class="subline">(full scale)</div>';
}



function syncGeneralToggles(){
  if(flatSharpToggle)flatSharpToggle.checked=(S.acc==='flat');
  if(letterNotesToggle)letterNotesToggle.checked=(S.label==='note');
  if(flatBtn)flatBtn.classList.toggle('on',S.acc==='flat');
  if(sharpBtn)sharpBtn.classList.toggle('on',S.acc==='sharp');
  if(noteBtn)noteBtn.classList.toggle('on',S.label==='note');
  if(intBtn)intBtn.classList.toggle('on',S.label==='interval');
}

function normalizeSidePanelTypography(){
  const ids=['posBtnMain','displayToolsBtn','playMenuBtn','triadSettingsBtn','chords','resetBtn'];
  ids.forEach(id=>{
    const el=$(id);
    if(!el)return;
    el.style.fontSize='14px';
    el.style.lineHeight='1.15';
    el.style.fontWeight='700';
    el.querySelectorAll('*').forEach(child=>{
      child.style.fontSize='14px';
      child.style.lineHeight='1.15';
      child.style.fontWeight='700';
    });
  });
  const sub=posBtnMain&&posBtnMain.querySelector('div:nth-child(2)');
  if(sub){
    sub.style.fontSize='11px';
    sub.style.lineHeight='1.05';
    sub.style.fontWeight='600';
  }
}

function render(){
  populateControls();
  S.root=root();
  S.prevKeyRoot=ni(keyObj()[0]);
  if(S.triadOn){
    if(S.active!==null&&S.active!==undefined)setTriad(S.active);
    else if(S.chordSelect!==null)setTriad(S.chordSelect);
    else setTriad(0);
  }
  flatBtn.classList.toggle('on',S.acc==='flat');
  sharpBtn.classList.toggle('on',S.acc==='sharp');
  noteBtn.classList.toggle('on',S.label==='note');
  intBtn.classList.toggle('on',S.label==='interval');
  triadTog.checked=S.triadOn;
  triadSettingsBtn.classList.toggle('on',S.triadStrings.size<6||S.triadPent||S.showKeyPositions);
  posBtnMain.classList.toggle('on',S.stage>0);
  updateScaleButton();
  playTog.checked=S.showAllBars;
  plineTog.checked=S.pLines;
  bpmNum.textContent=S.bpm;
  drawBoard();
  renderChords();
  renderPlayDialog();
  renderDisplayDialog();
  normalizeSidePanelTypography();syncGeneralToggles();syncEditModeButtons();
}

function drawBoard(){
  bd.innerHTML='';orow.innerHTML='';
  const X=stringXs(), F=Array.from({length:TOTAL_FRETS+1},(_,i)=>fretY(i));
  renderHighlights(X,F);
  X.forEach((x,i)=>{
    const t=document.createElement('button');
    t.className='tune';t.style.left=x+'px';
    t.onclick=e=>{const r=t.getBoundingClientRect();S.tuning[i]=SH[(ni(S.tuning[i])+(e.clientY-r.top<r.height/2?1:-1)+12)%12];rebuildPositions();syncSegmentMarks();render()};
    orow.appendChild(t);
    const o=document.createElement('div');
    o.className='open';
    if(S.marks.has(keyOf(i,0))){const m=S.marks.get(keyOf(i,0));o.className+=' '+m.c+(pcAt(i,0)===S.root?' root':'')}
    o.style.left=x+'px';o.textContent=noteAt(i,0);orow.appendChild(o);
    if(pcAt(i,0)===S.root)addKeyRootRing(x,32,orow);
  });
  for(let f=1;f<=TOTAL_FRETS;f++){const d=document.createElement('div');d.className='fret';d.style.top=F[f]-1.5+'px';bd.appendChild(d)}
  X.forEach((x,i)=>{const s=document.createElement('div');s.className='string';s.style.left=x+'px';s.style.width=STRING_WIDTH[i]+'px';s.onclick=e=>{e.stopPropagation();toggleStringHighlight(i);render()};bd.appendChild(s)});
  INLAY_FRETS.forEach(f=>{const y=(F[f-1]+F[f])/2;if(f===12){[.3,.7].forEach(p=>addInlay(p*bd.clientWidth,y))}else addInlay(bd.clientWidth/2,y)});
  for(let f=1;f<=TOTAL_FRETS;f++){const d=document.createElement('button');d.className='fretlab'+(S.hiFrets.has(f)?' on':'');d.type='button';d.style.top=(F[f-1]+F[f])/2+'px';d.textContent=f;d.onclick=e=>{e.stopPropagation();toggleFretHighlight(f);render()};bd.appendChild(d)}
  X.forEach((x,i)=>{const d=document.createElement('button');d.className='stringlab'+(S.hiStrings.has(i)?' on':'');d.type='button';d.style.left=(x-7)+'px';d.style.top=(bd.clientHeight+3)+'px';d.textContent=6-i;d.onclick=e=>{e.stopPropagation();toggleStringHighlight(i);render()};bd.appendChild(d)});
  for(let s=0;s<6;s++)for(let f=1;f<=TOTAL_FRETS;f++){const h=document.createElement('div');h.className='hit';h.style.left=X[s]+'px';h.style.top=(F[f-1]+F[f])/2+'px';h.style.height=Math.max(28,F[f]-F[f-1])+'px';h.onclick=e=>{e.stopPropagation();press(s,f,e)};bd.appendChild(h)}
  renderMarks(X,F);
  renderLeadingTriadDots(X,F);
}
function addInlay(x,y){const d=document.createElement('div');d.className='inlay';d.style.left=x+'px';d.style.top=y+'px';bd.appendChild(d)}
function addKeyRootRing(cx,cy,parentEl=bd){const ring=document.createElement('div');ring.className='keyrootring';ring.style.left=cx+'px';ring.style.top=cy+'px';parentEl.appendChild(ring)}
function addTriadRootDot(cx,cy){const ring=document.createElement('div');ring.className='triadrootring';ring.style.left=cx+'px';ring.style.top=cy+'px';bd.appendChild(ring)}
function laneBounds(X,s){const l=s===0?0:(X[s-1]+X[s])/2,r=s===5?bd.clientWidth:(X[s]+X[s+1])/2;return[l,r]}
function renderHighlights(X,F){
  if(S.hiFrets.size&&S.hiStrings.size){for(const s of S.hiStrings){const [l,r]=laneBounds(X,s);for(const f of S.hiFrets){const h=document.createElement('div');h.className='cellhi';h.style.left=l+'px';h.style.width=(r-l)+'px';h.style.top=F[f-1]+'px';h.style.height=(F[f]-F[f-1])+'px';bd.appendChild(h)}}return}
  for(const f of S.hiFrets){const h=document.createElement('div');h.className='frethi';h.style.top=F[f-1]+'px';h.style.height=(F[f]-F[f-1])+'px';bd.appendChild(h)}
  for(const s of S.hiStrings){const [l,r]=laneBounds(X,s);const h=document.createElement('div');h.className='stringhi';h.style.left=l+'px';h.style.width=(r-l)+'px';bd.appendChild(h)}
}
function toggleStringHighlight(s){S.hiStrings.has(s)?S.hiStrings.delete(s):S.hiStrings.add(s)}
function toggleFretHighlight(f){if(S.lastHi!==null&&S.lastHi!==f){const a=Math.min(S.lastHi,f),b=Math.max(S.lastHi,f);for(let x=a;x<=b;x++)S.hiFrets.add(x);S.lastHi=null;return}if(S.hiFrets.has(f)){S.hiFrets.delete(f);S.lastHi=null}else{S.hiFrets.add(f);S.lastHi=f}}
function showInHighlight(s,f){return (!S.hiFrets.size||S.hiFrets.has(f))&&(!S.hiStrings.size||S.hiStrings.has(s))}

function renderMarks(X,F){
  renderPentLines(X,F);renderManualLines(X,F);renderChordRings(X,F);renderSegments(X,F);renderTriadPentDots(X,F);renderKeyPositionDots(X,F);
  for(const m of S.marks.values()){
    if(m.f===0||!showInHighlight(m.s,m.f))continue;
    const cx=X[m.s],cy=(F[m.f-1]+F[m.f])/2;
    const d=document.createElement('div');d.className='mark '+m.c+(pcAt(m.s,m.f)===S.root?' root':'');
    d.style.left=cx+'px';d.style.top=cy+'px';d.textContent=dotText(m.s,m.f);d.onclick=e=>{e.stopPropagation();press(m.s,m.f,e)};bd.appendChild(d);
    if(pcAt(m.s,m.f)===S.root)addKeyRootRing(cx,cy);
  }
  if(S.triadOn&&S.triad){
    const pcs=[...new Set(S.triad.notes.map(n=>n.pc))];
    for(let s=0;s<6;s++)for(let f=1;f<=TOTAL_FRETS;f++)if(pcs.includes(pcAt(s,f))&&showInHighlight(s,f)&&triadStringOk(s)){
      const cx=X[s],cy=(F[f-1]+F[f])/2;
      addChordRing(cx,cy);
      if(pcAt(s,f)===S.triad.root)addTriadRootDot(cx,cy);
      addGhostLabel(cx,cy,triadDisplayText(s,f));
    }
  }
}
function addChordRing(cx,cy){const d=document.createElement('div');d.className='chordring';d.style.left=cx+'px';d.style.top=cy+'px';bd.appendChild(d)}
function addGhostLabel(cx,cy,text){
  const lab=document.createElement('div');
  lab.className='triadlabel triadghost';
  lab.style.position='absolute';
  lab.style.left=cx+'px';
  lab.style.top=cy+'px';
  lab.style.transform='translate(-50%,-50%)';
  lab.style.fontSize='14px';
  lab.style.lineHeight='1';
  lab.textContent=text;
  bd.appendChild(lab);
}
function triadStringOk(s){return S.triadStrings.has(s)}
function renderLeadingTriadDots(X,F){
  if(!S.leadingTriad||S.leadingTriadChord===null||S.leadingTriadChord===undefined)return;
  const pcs=chordTriadPcs(S.leadingTriadChord);
  for(let s=0;s<6;s++){
    if(!triadStringOk(s))continue;
    for(let f=1;f<=TOTAL_FRETS;f++){
      if(pcs.includes(pcAt(s,f))&&showInHighlight(s,f)){
        const d=document.createElement('div');
        d.className='leadingtriaddot';
        d.style.left=X[s]+'px';
        d.style.top=((F[f-1]+F[f])/2)+'px';
        bd.appendChild(d);
      }
    }
  }
}
function chordTriadPcs(i){const p=parent(),r=p[i];return i===0||i===3||i===4?[r,(r+4)%12,(r+7)%12]:i===6?[r,(r+3)%12,(r+6)%12]:[r,(r+3)%12,(r+7)%12]}
function renderChordRings(X,F){return}
function activeTriadPcs(){if(S.triadOn&&S.triad)return [...new Set(S.triad.notes.map(n=>n.pc))];return []}
function activeTriadRootPc(){if(S.triadOn&&S.triad)return S.triad.root;return null}
function isTriadPc(s,f){return activeTriadPcs().includes(pcAt(s,f))&&showInHighlight(s,f)&&triadStringOk(s)}

      const m2=midiAt(s2,f2);

function positionModeDialog(dialog,evt,s=null,f=null){
  const box=dialog.querySelector('.modebox');
  if(!box)return;
  const w=152,h=170,pad=8,gap=12;
  let cx=window.innerWidth/2, cy=window.innerHeight/2;

  if(s!==null&&f!==null){
    const rect=bd.getBoundingClientRect();
    const X=stringXs();
    const F=Array.from({length:TOTAL_FRETS+1},(_,i)=>fretY(i));
    cx=rect.left+X[s];
    cy=rect.top+(f===0?0:(F[f-1]+F[f])/2);
  }else if(evt&&evt.clientX!==undefined){
    cx=evt.clientX;
    cy=evt.clientY;
  }

  let x=cx-w/2;
  let y=cy-h-gap; // prefer centered above the edit point

  if(y<pad)y=cy+gap; // if not enough room above, place below
  if(y+h>window.innerHeight-pad)y=Math.max(pad,window.innerHeight-h-pad);

  x=Math.max(pad,Math.min(window.innerWidth-w-pad,x));
  box.style.left=x+'px';
  box.style.top=y+'px';
}

function convertPendingToBar(){
  const p=S.pendingSwitch;
  if(!p||p.type!=='note')return;
  const key=keyOf(p.s,p.f);
  S.marks.delete(key);
  toggleSegmentAt(p.s,p.f);
}
function convertPendingToLine(){
  const p=S.pendingSwitch;
  if(!p||p.type!=='lineNote')return;
  const target=findAdjacentHigherPentNote(p.s,p.f);
  if(!target)return;
  // Line mode uses black note markers at both ends of the manual line.
  S.marks.set(keyOf(p.s,p.f),mark(p.s,p.f,'black'));
  S.marks.set(keyOf(target.s,target.f),mark(target.s,target.f,'black'));
  S.manualLines.add(lineKey({s:p.s,f:p.f},target));
  render();
}
function convertPendingToNote(){
  const p=S.pendingSwitch;
  if(!p)return;
  if(p.type==='bar'){
    S.segments.delete(p.key);
    syncSegmentMarks();
    const mid=Math.round((p.a+p.b)/2);
    S.marks.set(keyOf(p.s,mid),mark(p.s,mid,S.color));
    render();
  }else if(p.type==='line'){
    S.manualLines.delete(p.key);
    S.marks.set(keyOf(p.s,p.f),mark(p.s,p.f,'black'));
    if(p.s2!==undefined)safeDeleteLineEndpoint(keyOf(p.s2,p.f2));
    render();
  }
}

function hasManualLineAt(s,f){
  for(const key of S.manualLines){
    const ln=lineFromKey(key);
    if((ln.s===s&&ln.f===f)||(ln.s2===s&&ln.f2===f))return key;
  }

function toggleManualLineAt(s,f){
  const existing=hasManualLineAt(s,f);
  if(existing){
    S.manualLines.delete(existing); // delete line only; leave notes
    render();
    return;
  }
  const target=findAdjacentHigherPentNote(s,f);
  if(!target)return;
  S.marks.set(keyOf(s,f),mark(s,f,'black'));
  S.marks.set(keyOf(target.s,target.f),mark(target.s,target.f,'black'));
  S.manualLines.add(lineKey({s,f},target));

function press(s,f,evt=null){
  const key=keyOf(s,f);

  // No manual edit mode selected: fretboard clicks do not add/remove/edit.
  if(!S.insertMode)return;

  if(S.insertMode==='bars'){
    toggleSegmentAt(s,f);
    return;
  }

  if(S.insertMode==='lines'){
    toggleManualLineAt(s,f);
    return;
  }

  if(S.insertMode==='notes'){
    if(S.marks.has(key))S.marks.delete(key);
    else S.marks.set(key,mark(s,f,S.color));
    render();
    return;
  }
}

function getCtx(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();return AC}
function hz(m){return 440*Math.pow(2,(m-69)/12)}
function toneStackAt(midis,startTime,dur=.65,level=.12){
  const c=getCtx(),g=c.createGain(),os=[];
  const attack=.006,release=.05;
  g.gain.setValueAtTime(.0001,startTime);
  g.gain.exponentialRampToValueAtTime(level,startTime+attack);
  g.gain.setValueAtTime(level,Math.max(startTime+attack,startTime+dur-release));
  g.gain.exponentialRampToValueAtTime(.0001,startTime+dur);
  midis.forEach((m,i)=>{
    const o=c.createOscillator(),gg=c.createGain();
    o.type='triangle';
    o.frequency.setValueAtTime(hz(m),startTime);

    // Slightly stronger bass/root, gentle upper voices.
    const baseGain = midis.length>2 ? (i===0?.30:.20) : (i?.40:.78);
    gg.gain.setValueAtTime(baseGain,startTime);

    const h=c.createOscillator(), hg=c.createGain();
    h.type='sine';
    h.frequency.setValueAtTime(hz(m)*2,startTime);
    hg.gain.setValueAtTime(i===0?.07:.045,startTime);

    // Subtle stereo spread: bass/root just left, upper voices just right.
    let panNode=null;
    if(c.createStereoPanner){
      panNode=c.createStereoPanner();
      panNode.pan.setValueAtTime(i===0?-0.12:0.10,startTime);
      o.connect(gg);
      h.connect(hg);
      gg.connect(panNode);
      hg.connect(panNode);
      panNode.connect(g);
    }else{
      o.connect(gg);
      h.connect(hg);
      gg.connect(g);
      hg.connect(g);
    }

    // Subtle short-room ambience: tiny delayed send, very low level.
    // This makes chords less dry without changing rhythm or timing.
    if(c.createDelay){
      const roomDelay=c.createDelay(.25), roomGain=c.createGain();
      roomDelay.delayTime.setValueAtTime(i===0?.035:.055,startTime);
      roomGain.gain.setValueAtTime(i===0?.018:.026,startTime);
      if(panNode){
        panNode.connect(roomDelay);
      }else{
        gg.connect(roomDelay);
        hg.connect(roomDelay);
      }
      roomDelay.connect(roomGain);
      roomGain.connect(g);
    }

    o.start(startTime);
    h.start(startTime);
    o.stop(startTime+dur+.03);
    h.stop(startTime+dur+.03);

    os.push(o);
    os.push(h);
  });
  g.connect(c.__masterOut||c.destination);
  return{oscs:os,gain:g,start:startTime,dur};
}
function toneStack(midis,level=.12){return toneStackAt(midis,getCtx().currentTime,.65,level)}
function stopPart(p,fade=.12){
  const now=getCtx().currentTime;
  try{
    p.gain.gain.cancelScheduledValues(now);
    p.gain.gain.setValueAtTime(Math.max(p.gain.gain.value,.0001),now);
    p.gain.gain.exponentialRampToValueAtTime(.0001,now+fade);
    p.oscs.forEach(o=>{try{o.stop(now+fade+.03)}catch(e){}});
  }catch(e){}
}

function voiceLedTriadMidis(i){
  const pcs=chordTriadPcs(i);
  const prev=(drone&&drone.lastTriadMidis&&drone.lastTriadMidis.length===3)?drone.lastTriadMidis:null;
  if(!prev){
    const base=triadMidis(i);
    if(drone)drone.lastTriadMidis=base.slice();
    return base;
  }
  const out=[];
  pcs.forEach((pc,idx)=>{
    let best=null,bestDist=1e9;
    for(let m=pc+36;m<=pc+84;m+=12){
      const d=Math.abs(m-prev[idx]);
      if(d<bestDist){bestDist=d;best=m}
    }
    out.push(best);
  });

  // Defensive filter: only the exact chord triad pitch classes may sound.
  const clean=out.filter(m=>pcs.includes(((m%12)+12)%12)).slice(0,3);
  while(clean.length<3)clean.push(triadMidis(i)[clean.length]);
  clean.sort((a,b)=>a-b);
  if(drone)drone.lastTriadMidis=clean.slice();
  return clean;
}
function triadMidis(i){const pcs=chordTriadPcs(i),out=[];let prev=55;for(const pc of pcs){let m=60;while(m%12!==pc)m++;while(m<=prev)m+=12;prev=m;out.push(m)}return out}
function bassMidiForDegree(i){
  // Bass must use the exact root of the chord triad being played.
  // Using rotatedScale()[i] can drift under modal states and create dissonance.
  const pc=chordTriadPcs(i)[0];
  let m=48;
  while(m%12!==pc)m++;
  return m;
}
function selectedChordIndex(){return S.chordSelect!==null?S.chordSelect:(S.active!==null&&S.active!==undefined?S.active:0)}
function chordDronePart(i){return toneStack([bassMidiForDegree(i),...triadMidis(i)],.13)}
function scheduleToneAt(midis,start,dur,level=.12){

  const p=toneStackAt(midis,start,Math.max(.05,dur),level);

function scheduleTone(midis,delay,dur,level=.12){

  }
  const chord=(b,d=0.45,l=.12)=>scheduleToneAt(tri,startTime+b*beat,d*beat,l);

function playPattern(i){

function cleanupAudioPools(){
  if(!drone)return;
  const now=getCtx().currentTime;
  if(drone.parts)drone.parts=drone.parts.filter(p=>p&&p.start!==undefined&&p.start+p.dur+1.0>now);
  if(drone.clicks)drone.clicks=drone.clicks.filter(p=>p&&p.start!==undefined&&p.start+p.dur+0.5>now);
}
function clearAudioScheduler(){
  if(!drone)return;
  clearTimeout(drone.audioTimer);
  drone.audioTimer=null;
}
function scheduleProgressionAudio(){
  if(!drone||!drone.prog)return;
  const c=getCtx();
  const beat=drone.beatMs/1000;
  const chordDur=8*beat;
  const seq=drone.seq;
  const now=c.currentTime;

  cleanupAudioPools();

  if(!drone.nextAudioTime){
    drone.nextAudioTime=now+.08;
    drone.visualStartTime=drone.nextAudioTime;
    drone.nextVisualTime=drone.nextAudioTime+chordDur;
  }

  // Keep a modest, rolling look-ahead. This avoids both drift and long-term node buildup.
  const lookAhead=Math.max(chordDur*2.25,4.0);
  while(drone.nextAudioTime<now+lookAhead){
    const idx=drone.audioStep%seq.length;
    playPatternAt(seq[idx],drone.nextAudioTime);
    drone.audioStep++;
    drone.nextAudioTime+=chordDur;
  }

  clearTimeout(drone.audioTimer);
  const nextCheck=Math.max(80,Math.min(350,(drone.nextAudioTime-now-lookAhead*.55)*1000));
  drone.audioTimer=setTimeout(scheduleProgressionAudio,nextCheck);
}

    const cb=$('triStr'+n);
    if(cb&&cb.checked)ns.add(6-n);
  }
  if(ns.size)S.triadStrings=ns;

  S.triadOn=true;
  if(triadEnableCheck)triadEnableCheck.checked=true;
  if(triadTog)triadTog.checked=true;

    const seq=progressions()[+progSel.value],beat=60000/S.bpm;

function clearPattern(){if(!drone)return;(drone.rhythmTimers||[]).forEach(clearTimeout);drone.rhythmTimers=[];(drone.parts||[]).forEach(p=>stopPart(p,.035));drone.parts=[];cleanupAudioPools()}
function holdCurrentChord(){if(!drone)return;clearPattern();let i=S.active;if(i===null||i===undefined)i=selectedChordIndex();S.active=i;setTriad(i);drone.holdPart=toneStack([bassMidiForDegree(i),...triadMidis(i)],.16);render()}

function setLeadingTriadForNext(){

function scheduleProgressionVisuals(){
  if(!drone||!drone.prog)return;
  clearTimeout(drone.timer);
  clearTimeout(drone.leadTimer);

  const c=getCtx();
  const chordDur=8*drone.beatMs/1000;
  const lead=2*drone.beatMs/1000;

  if(!drone.nextVisualTime){
    drone.nextVisualTime=(drone.visualStartTime||c.currentTime)+chordDur;
  }

  // Catch up display state to the next audio-clock boundary.
  while(drone.nextVisualTime<=c.currentTime+.02){
    progStep(false);
    drone.nextVisualTime+=chordDur;
  }

  const nextBoundary=drone.nextVisualTime;
  const leadTime=nextBoundary-lead;

  if(S.leadingTriad){
    const leadDelay=Math.max(0,(leadTime-c.currentTime)*1000);
    drone.leadTimer=setTimeout(()=>{if(drone&&drone.prog&&drone.state!=='held')setLeadingTriadForNext()},leadDelay);
  }

  const boundaryDelay=Math.max(0,(nextBoundary-c.currentTime)*1000);
  drone.timer=setTimeout(()=>{
    if(!drone||!drone.prog)return;
    if(drone.state!=='held')progStep(false);

function clock(){
  if(!drone)return;
  clearTimeout(drone.timer);
  if(drone.prog){
    scheduleProgressionVisuals();
    return;
  }
  const tick=()=>{
    if(!drone||drone.prog)return;
    if(drone.state!=='held'){
      drone.beat=(drone.beat||0)+1;
      /* metronome clicks are scheduled by the audio engine only */
      if(drone.beat>=8){
        drone.beat=0;
        clearPattern();
        playPattern(selectedChordIndex());
      }
    }
    drone.timer=setTimeout(tick,drone.beatMs||60000/S.bpm);
  };
  drone.timer=setTimeout(tick,drone.beatMs||60000/S.bpm);
}
function clickAt(time,accent){
  const c=getCtx();
  const noise=c.createOscillator();
  const filt=c.createBiquadFilter();
  const g=c.createGain();

  noise.type='triangle';
  noise.frequency.setValueAtTime(accent?1800:1300,time);

  filt.type='bandpass';
  filt.frequency.setValueAtTime(accent?2200:1700,time);
  filt.Q.value=8;

  g.gain.setValueAtTime(0.0001,time);
  g.gain.linearRampToValueAtTime(accent?0.24:0.16,time+0.002);
  g.gain.exponentialRampToValueAtTime(0.0001,time+0.028);

  noise.connect(filt);
  filt.connect(g);
  g.connect(c.__masterOut||c.destination);

  noise.start(time);
  noise.stop(time+0.03);

  if(drone){
    if(!drone.clicks)drone.clicks=[];
    drone.clicks.push({oscs:[noise],gain:g,start:time,dur:.03});
  }
}

function stopDrone(){
  if(!drone)return;
  clearTimeout(drone.timer);
  clearTimeout(drone.audioTimer);
  clearTimeout(drone.leadTimer);
  (drone.rhythmTimers||[]).forEach(clearTimeout);
  cleanupAudioPools();
  const parts=[];
  if(drone.parts)parts.push(...drone.parts);
  if(drone.clicks)parts.push(...drone.clicks);
  if(drone.holdPart)parts.push(drone.holdPart);
  if(drone.oscs)parts.push(drone);
  parts.forEach(p=>stopPart(p,.035));
  const wasProg=!!(drone&&drone.prog);
  drone=null;
  S.active=null;
  S.triad=null;
  S.leadingTriadChord=null;
  if(wasProg&&progSel){
    progSel.selectedIndex=0;
    progSel.value='';
  }
  closePlaybackChordDialog();
  updateDroneButton();
  render();
}

    droneBtn.classList.add('on','stopicon');
  }
}

function positionPanelPopup(dialog,button,prefer='above'){

  }

  const bw=box.offsetWidth||152;
  const bh=box.offsetHeight||180;
  let x=br.left+br.width/2-bw/2;
  let y=prefer==='below'?br.bottom+gap:br.top-bh-gap;

  if(prefer==='above' && y<pad)y=br.bottom+gap;
  if(prefer==='below' && y+bh>window.innerHeight-pad)y=br.top-bh-gap;

  x=Math.max(pad,Math.min(window.innerWidth-bw-pad,x));
  y=Math.max(pad,Math.min(window.innerHeight-bh-pad,y));

  box.style.left=x+'px';
  box.style.top=y+'px';

  if(!wasOn){
    dialog.style.display=oldDisplay;
    dialog.style.pointerEvents=oldPointer;
    box.style.visibility=oldVisibility;
  }
}
function positionChordPopupUnderSound(){
  const soundBox=playDialog.querySelector('.playbox');
  const chordBoxEl=chordDialog.querySelector('.chordbox');
  if(!soundBox||!chordBoxEl)return;
  const sr=soundBox.getBoundingClientRect();
  const gap=10,pad=8;
  const oldDisplay=chordDialog.style.display;
  const oldVisibility=chordBoxEl.style.visibility;
  const oldPointer=chordDialog.style.pointerEvents;
  const wasOn=chordDialog.classList.contains('on');

  if(!wasOn){
    chordDialog.style.display='block';
    chordDialog.style.pointerEvents='none';
    chordBoxEl.style.visibility='hidden';
  }

  const bw=chordBoxEl.offsetWidth||152;
  const bh=chordBoxEl.offsetHeight||180;
  let x=sr.left+sr.width/2-bw/2;
  let y=sr.bottom+gap;

  // If below Sound does not fit, place above Sound.
  if(y+bh>window.innerHeight-pad)y=sr.top-bh-gap;

  x=Math.max(pad,Math.min(window.innerWidth-bw-pad,x));
  y=Math.max(pad,Math.min(window.innerHeight-bh-pad,y));

  chordBoxEl.style.left=x+'px';
  chordBoxEl.style.top=y+'px';

  if(!wasOn){
    chordDialog.style.display=oldDisplay;
    chordDialog.style.pointerEvents=oldPointer;
    chordBoxEl.style.visibility=oldVisibility;
  }
}

function syncTriadDialogFromState(){
  // Right/on = included. Left/off = filtered out.
  // UI String n maps to internal string index 6-n.
  for(let n=1;n<=6;n++){
    const cb=$('triStr'+n);
    if(cb)cb.checked=S.triadStrings.has(6-n);
  }
  if(triadEnableCheck)triadEnableCheck.checked=!!S.triadOn;
  if(triadTog)triadTog.checked=!!S.triadOn;
  if(leadingTriadCheck)leadingTriadCheck.checked=!!S.leadingTriad;
  if(triadPentCheck)triadPentCheck.checked=!!S.triadPent;
  if(keyPosCheck)keyPosCheck.checked=false;
}
function applyTriadDialogLive(){
  const ns=new Set();
  for(let n=1;n<=6;n++){
    const cb=$('triStr'+n);
    if(cb&&cb.checked)ns.add(6-n); // right/on = included
  }
  if(ns.size===0){ns.add(2);ns.add(3);ns.add(4);}
  S.triadStrings=ns;
  S.leadingTriad=!!(leadingTriadCheck&&leadingTriadCheck.checked);
  S.triadPent=!!(triadPentCheck&&triadPentCheck.checked);
  S.showKeyPositions=false;

  S.triadOn=!!(drone||S.triadPent);
  if(triadEnableCheck)triadEnableCheck.checked=S.triadOn;
  if(triadTog)triadTog.checked=S.triadOn;

  if(!S.leadingTriad)S.leadingTriadChord=null;
  else if(drone&&drone.prog)setLeadingTriadForNext();
  else if(progSel&&progSel.value!==''){
    const seq=progressions()[+progSel.value];
    S.leadingTriadChord=seq&&seq.length?seq[0]:null;
  }else if(S.chordSelect!==null){
    S.leadingTriadChord=S.chordSelect;
  }else{
    S.leadingTriadChord=null;
  }

  if(S.triadOn){
    if(S.active!==null&&S.active!==undefined)setTriad(S.active);
    else if(S.chordSelect!==null)setTriad(S.chordSelect);
    else S.triad=null;
  }else{
    S.triad=null;
  }

  if(drone&&drone.prog)scheduleProgressionVisuals();
  render();
}

function syncLeadingTriadFromTools(){
  S.leadingTriad=!!(leadingTriadCheck&&leadingTriadCheck.checked);

  renderChords();
}

      }

    };
  }

<script>
/* Guit-Map 2.91 Audio Enhancement Layer */
(function(){
  const AC = window.AudioContext || window.webkitAudioContext;
  if(!AC) return;

  const orig = AC.prototype.createOscillator;
  AC.prototype.createOscillator = function(){
    const o = orig.call(this);

    const startOrig = o.start.bind(o);
    o.start = function(t){
      try{
        // Slightly soften oscillator timbre where possible.
        if(o.type === 'square') o.type = 'triangle';
      }catch(e){}
      return startOrig(t);
    };
    return o;
  };

  // Add a lightweight master compressor once context exists.
  const oldResume = AC.prototype.resume;
  AC.prototype.resume = function(){
    if(!this.__guitMap291){
      try{
        const comp = this.createDynamicsCompressor();
        comp.threshold.value = -26;
        comp.knee.value = 24;
        comp.ratio.value = 2.0;
        comp.attack.value = 0.01;
        comp.release.value = 0.18;
        this.__guitMap291 = comp;
      }catch(e){}
    }
    return oldResume ? oldResume.apply(this, arguments) : Promise.resolve();
  };
})();

(function(){
  window.GUITMAP_AUDIO_VERSION='2.96';

  const AC = window.AudioContext || window.webkitAudioContext;
